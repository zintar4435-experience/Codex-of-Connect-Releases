<title>Codex of Connect — Guide</title>
<style>
  :root {
    --bg: #F6F8F9; --surface: #FFFFFF; --surface-2: #EEF2F3; --ink: #141A1E;
    --ink-soft: #3D474D; --mute: #6B767C; --line: #DCE3E5; --accent: #0E9F8C;
    --accent-ink: #0B7C6E; --accent-wash: #E1F3F0; --warn: #B87611;
    --warn-wash: #F8EEDC; --danger: #C0492F;

  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0D1114; --surface: #141A1E; --surface-2: #1B2329; --ink: #E8EDEF;
      --ink-soft: #C2CBD0; --mute: #8A959B; --line: #263036; --accent: #2AC6B0;
      --accent-ink: #63D8C7; --accent-wash: #10312D; --warn: #E0A64A;
      --warn-wash: #2C2413; --danger: #E67A62;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"] {
    --bg: #F6F8F9; --surface: #FFFFFF; --surface-2: #EEF2F3; --ink: #141A1E;
    --ink-soft: #3D474D; --mute: #6B767C; --line: #DCE3E5; --accent: #0E9F8C;
    --accent-ink: #0B7C6E; --accent-wash: #E1F3F0; --warn: #B87611;
    --warn-wash: #F8EEDC; --danger: #C0492F;
    --shadow: 0 1px 2px rgba(20,26,30,.05), 0 8px 24px rgba(20,26,30,.06);
  }
  :root[data-theme="dark"] {
    --bg: #0D1114; --surface: #141A1E; --surface-2: #1B2329; --ink: #E8EDEF;
    --ink-soft: #C2CBD0; --mute: #8A959B; --line: #263036; --accent: #2AC6B0;
    --accent-ink: #63D8C7; --accent-wash: #10312D; --warn: #E0A64A;
    --warn-wash: #2C2413; --danger: #E67A62;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--sans); font-size: 17px; line-height: 1.62;
    -webkit-font-smoothing: antialiased; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 20px; }

  .topbar { position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--bg) 86%, transparent);
    backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .topbar .wrap { display: flex; align-items: center; gap: 12px;
    min-height: 58px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 640; letter-spacing: -.01em; }
  .brand .glyph { width: 26px; height: 26px; border-radius: 8px; flex: none;
    background: linear-gradient(150deg, var(--accent), var(--accent-ink));
    display: grid; place-items: center; color: #fff;
    box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 45%, transparent); }
  .brand .glyph svg { width: 15px; height: 15px; }
  .brand small { color: var(--mute); font-weight: 500; }
  .spacer { flex: 1 1 auto; }

  .seg { display: inline-flex; padding: 3px; gap: 2px;
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; }
  .seg button { appearance: none; border: 0; cursor: pointer; font: inherit;
    font-size: 13px; font-weight: 560; color: var(--mute); background: transparent;
    padding: 6px 12px; border-radius: 7px; line-height: 1;
    display: inline-flex; align-items: center; gap: 6px;
    transition: color .15s, background .15s, box-shadow .15s; }
  .seg button svg { width: 14px; height: 14px; }
  .seg button[aria-pressed="true"] { color: var(--ink); background: var(--surface); box-shadow: var(--shadow); }
  .seg button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .seg.lang button { padding: 6px 10px; }

  .hero { padding: 58px 0 30px; }
  .eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent-ink); font-weight: 640; margin: 0 0 16px; }
  h1 { font-size: clamp(2rem, 6vw, 3.1rem); line-height: 1.06;
    letter-spacing: -.028em; font-weight: 720; margin: 0; text-wrap: balance; }
  .lede { margin: 20px 0 0; font-size: 1.13rem; color: var(--ink-soft); max-width: 42ch; text-wrap: pretty; }

  .keystone { margin: 34px 0 8px; position: relative; background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 22px 24px 22px 26px; overflow: hidden; }
  .keystone::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: linear-gradient(var(--accent), var(--accent-ink)); }
  .keystone h2 { margin: 0 0 6px; font-size: 1.06rem; letter-spacing: -.01em; }
  .keystone p { margin: 0; color: var(--ink-soft); font-size: .98rem; }
  .keystone strong { color: var(--ink); }

  section { padding: 26px 0; border-top: 1px solid var(--line); }
  section:first-of-type { border-top: 0; }
  .kicker { display: flex; align-items: baseline; gap: 12px; margin: 0 0 6px; }
  .num { font-variant-numeric: tabular-nums; font-family: var(--mono);
    font-size: .82rem; font-weight: 600; color: var(--accent-ink);
    background: var(--accent-wash); border-radius: 6px; padding: 3px 8px; flex: none; line-height: 1; }
  h2 { font-size: 1.4rem; letter-spacing: -.02em; margin: 0; font-weight: 680; text-wrap: balance; }
  h2.plain { margin: 0 0 10px; }
  p { margin: 0 0 14px; } p:last-child { margin-bottom: 0; }

  ul.clean { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
  ul.clean li { position: relative; padding-left: 26px; color: var(--ink-soft); }
  ul.clean li::before { content: ""; position: absolute; left: 4px; top: .62em;
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  ul.clean li b { color: var(--ink); font-weight: 600; }

  .path { font-family: var(--mono); font-size: .86em; background: var(--surface-2);
    border: 1px solid var(--line); border-radius: 6px; padding: 1px 7px; white-space: nowrap; color: var(--ink); }
  code { font-family: var(--mono); font-size: .86em; background: var(--surface-2);
    border: 1px solid var(--line); border-radius: 5px; padding: 1px 5px; }

  .note { display: grid; grid-template-columns: 22px 1fr; gap: 12px; background: var(--surface);
    border: 1px solid var(--line); border-left: 3px solid var(--accent); border-radius: 10px;
    padding: 15px 17px; margin: 16px 0 0; font-size: .95rem; }
  .note.warn { border-left-color: var(--warn); background: color-mix(in srgb, var(--warn-wash) 55%, var(--surface)); }
  .note.danger { border-left-color: var(--danger); }
  .note .ic { color: var(--accent); margin-top: 2px; }
  .note.warn .ic { color: var(--warn); } .note.danger .ic { color: var(--danger); }
  .note svg { width: 18px; height: 18px; }
  .note b { color: var(--ink); } .note p { margin: 0; color: var(--ink-soft); }

  .plat { border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; margin-top: 14px; background: var(--surface); }
  .plat > .tag { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
    font-weight: 640; letter-spacing: .02em; color: var(--accent-ink); margin-bottom: 10px; }
  .plat > .tag svg { width: 14px; height: 14px; }
  body[data-plat="android"] .windows-only { display: none; }
  body[data-plat="windows"] .android-only { display: none; }

  details { border: 1px solid var(--line); border-radius: 11px; background: var(--surface); margin-top: 10px; overflow: hidden; }
  details[open] { box-shadow: var(--shadow); }
  summary { cursor: pointer; list-style: none; padding: 15px 18px; font-weight: 580;
    color: var(--ink); display: flex; align-items: center; gap: 12px; font-size: 1rem; }
  summary::-webkit-details-marker { display: none; }
  summary .chev { margin-left: auto; color: var(--mute); transition: transform .2s; flex: none; }
  summary .chev svg { width: 16px; height: 16px; display: block; }
  details[open] summary .chev { transform: rotate(90deg); }
  summary .q { color: var(--accent-ink); font-family: var(--mono); font-size: .8rem; flex: none; }
  details .body { padding: 0 18px 16px 44px; color: var(--ink-soft); font-size: .95rem; }

  footer { border-top: 1px solid var(--line); margin-top: 12px; padding: 28px 0 48px; color: var(--mute); font-size: .88rem; }
  footer .wrap { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
  a { color: var(--accent-ink); text-underline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  @media (max-width: 560px) { body { font-size: 16px; } .hero { padding: 40px 0 22px; } details .body { padding-left: 18px; } }
</style>

  function setLang(l) {
    const dict = I[l] || I.ru;
    document.documentElement.lang = l;
    document.querySelectorAll('[data-i]').forEach(function (el) {
      const k = el.getAttribute('data-i');
      if (dict[k] != null) el.innerHTML = dict[k];
    });
    document.getElementById('lang-ru').setAttribute('aria-pressed', String(l === 'ru'));
    document.getElementById('lang-en').setAttribute('aria-pressed', String(l === 'en'));
    try { localStorage.setItem('coc-lang', l); } catch (e) {}
  }
  function setPlat(p) {
    document.body.setAttribute('data-plat', p);
    document.getElementById('btn-android').setAttribute('aria-pressed', String(p === 'android'));
    document.getElementById('btn-windows').setAttribute('aria-pressed', String(p === 'windows'));
    try { localStorage.setItem('coc-plat', p); } catch (e) {}
  }
  (function () {
    let lang = 'ru', plat = 'android';
    try {
      lang = localStorage.getItem('coc-lang') || (navigator.language || 'ru').slice(0, 2).toLowerCase();
      if (lang !== 'ru' && lang !== 'en') lang = 'en';
      plat = localStorage.getItem('coc-plat') || 'android';
    } catch (e) {}
    setLang(lang);
    setPlat(plat);
  })();
